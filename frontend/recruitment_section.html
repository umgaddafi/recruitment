<!-- Recruitment Support Section -->
<section id="contact-section" class="py-5 bg-light">
    <div class="container">
        <div class="row g-4 align-items-stretch">
            
            <!-- Left Column: Map -->
            <div class="col-lg-7">
                <div class="card h-100 border-0 shadow-sm overflow-hidden" style="min-height: 400px;">
                    <!-- Map Component / Iframe -->
                    <iframe 
                        src="https://www.google.com/maps/embed?pb=YOUR_MAP_ID" 
                        width="100%" 
                        height="100%" 
                        style="border:0;" 
                        allowfullscreen="" 
                        loading="lazy" 
                        referrerpolicy="no-referrer-when-downgrade">
                    </iframe>
                </div>
            </div>

            <!-- Right Column: Unified Contact Card -->
            <div class="col-lg-5">
                <div class="card h-100 border-0 shadow-sm p-4">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h2 class="h3 fw-bold mb-3">Recruitment Support</h2>
                        <p class="text-muted mb-4">Reach out to our team for any assistance or inquiries regarding our hiring process.</p>
                        
                        <div class="contact-details">
                            <!-- Address -->
                            <div class="d-flex mb-4">
                                <div class="bg-primary text-white rounded-3 p-2 me-3 flex-shrink-0">
                                    <i class="bi bi-geo-alt-fill"></i>
                                </div>
                                <div>
                                    <h6 class="fw-bold mb-1">Office Location</h6>
                                    <p class="text-muted small mb-0">123 Career Avenue, Suite 10, <br>Business District, NY 10001</p>
                                </div>
                            </div>

                            <!-- Phone -->
                            <div class="d-flex mb-4">
                                <div class="bg-success text-white rounded-3 p-2 me-3 flex-shrink-0">
                                    <i class="bi bi-telephone-fill"></i>
                                </div>
                                <div>
                                    <h6 class="fw-bold mb-1">Phone Number</h6>
                                    <p class="text-muted small mb-0">+1 (800) 123-4567</p>
                                </div>
                            </div>

                            <!-- Email -->
                            <div class="d-flex mb-4">
                                <div class="bg-info text-white rounded-3 p-2 me-3 flex-shrink-0">
                                    <i class="bi bi-envelope-fill"></i>
                                </div>
                                <div>
                                    <h6 class="fw-bold mb-1">Email Address</h6>
                                    <p class="text-muted small mb-0">support@recruitment-portal.com</p>
                                </div>
                            </div>
                        </div>

                        <div class="mt-4">
                            <button class="btn btn-outline-primary w-100 py-2">Get Support Now</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>
